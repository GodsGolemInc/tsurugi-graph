syntax = "proto3";

package tateyama.proto.graph.response;

message Response {
    oneof result {
        Success success = 1;
        Error error = 2;
    }
}

message Success {
    oneof payload {
        CypherSuccess cypher = 1;
        NodeSuccess node = 2;
        EdgeSuccess edge = 3;
    }
}

message CypherSuccess {
    string result_json = 1;
}

message NodeSuccess {
    uint64 node_id = 1;
    string properties_json = 2;
}

message EdgeSuccess {
    uint64 edge_id = 1;
    uint64 from_node_id = 2;
    uint64 to_node_id = 3;
    string label = 4;
    string properties_json = 5;
}

message Error {
    int32 code = 1;
    string message = 2;
}
